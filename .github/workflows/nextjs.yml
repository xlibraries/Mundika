# Build static Next.js export to `out/` and deploy to GitHub Pages.
# Repository → Settings → Secrets: add NEXT_PUBLIC_SUPABASE_URL and
# NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY so the client bundle can embed them.
# Supabase → Authentication → URL configuration:
# — Site URL = app root only, e.g. https://<user>.github.io/<Repo> (NOT /auth/callback).
# — Redirect URLs = allow https://<user>.github.io/<Repo>/auth/callback and local callback.
# Google Cloud → OAuth client: JavaScript origins = origins only (e.g. https://xlibraries.github.io).
# Google redirect URI for Supabase = https://<project-ref>.supabase.co/auth/v1/callback only.
name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        id: pages

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.js', '**/*.jsx', '**/*.mjs', '**/*.cjs') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Build static export
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
          NEXT_PUBLIC_PAYMENT_PROVIDER: ${{ secrets.NEXT_PUBLIC_PAYMENT_PROVIDER }}
          NEXT_PUBLIC_RAZORPAY_CHECKOUT_ENABLED: ${{ secrets.NEXT_PUBLIC_RAZORPAY_CHECKOUT_ENABLED }}
          NEXT_PUBLIC_RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
